            transform: scale(0.97);
            background-color: #000000;
        }

        /* Кастомный скроллбар (скрыт для красоты) */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Плавное появление */
        .fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }

    <!-- ОСНОВНАЯ ЛОГИКА -->
    <script>
        // ==========================================
        // ИНИЦИАЛИЗАЦИЯ VK BRIDGE API
        // ==========================================
        const vkBridge = window.vkBridge;
        
        if (vkBridge) {
            vkBridge.send('VKWebAppInit').catch(console.error);
            
            // Задаем цвет верхней панели для VK
            vkBridge.send('VKWebAppSetViewSettings', {
                status_bar_style: 'light',
                action_bar_color: '#b000ff'
            }).catch(() => { /* Игнорируем ошибку, если платформа не поддерживает */ });
        }

        // ==========================================
        // ОБЕРТКА ДЛЯ ВИБРАЦИИ (ТАКТИЛЬНЫЙ ОТКЛИК VK + БРАУЗЕРЫ)
        // ==========================================
        const vkHaptic = {
            impactOccurred: (style) => {
                try {
                    // Официальный метод для приложения ВКонтакте (работает на iOS и Android внутри ВК)
                    if (window.vkBridge && window.vkBridge.send) {
                        window.vkBridge.send('VKWebAppTapticImpactOccurred', { style: style }).catch(()=>{});
                    }
                    // Универсальный резервный метод для мобильных браузеров (Chrome, Yandex и др.)
                    if (navigator.vibrate) {
                        if (style === 'light') navigator.vibrate(15);
                        else if (style === 'medium') navigator.vibrate(25);
                        else navigator.vibrate(40);
                    }
                } catch (e) {}
            },
            notificationOccurred: (type) => {
                try {
                    if (window.vkBridge && window.vkBridge.send) {
                        window.vkBridge.send('VKWebAppTapticNotificationOccurred', { type: type }).catch(()=>{});
                    }
                    if (navigator.vibrate) {
                        if (type === 'success') navigator.vibrate([20, 50, 20]);
                        else if (type === 'warning') navigator.vibrate([30, 50, 30, 50, 30]);
                        else navigator.vibrate(40);
                    }
                } catch (e) {}
            }
        };

        // Запрет правой кнопки мыши (контекстного меню, п.1)
        document.addEventListener('contextmenu', event => event.preventDefault());

        function renderApp() {
            // Переводы статических элементов интерфейса
            document.getElementById('ui-about-btn-title').textContent = CONFIG.ui.aboutBtnTitle;
            document.getElementById('ui-about-btn-sub').textContent = CONFIG.ui.aboutBtnSub;
            document.getElementById('ui-reviews-title').textContent = CONFIG.ui.reviewsTitle;
            document.getElementById('ui-write-review-btn').textContent = CONFIG.ui.writeReview;
            document.getElementById('ui-fortune-btn-title').textContent = CONFIG.ui.fortuneBtnTitle;
            document.getElementById('ui-fortune-btn-sub').textContent = CONFIG.ui.fortuneBtnSub;
            document.getElementById('ui-socials-title').textContent = CONFIG.ui.socialsTitle;
            document.getElementById('ui-services-page-title').textContent = CONFIG.ui.servicesPageTitle;
            document.getElementById('ui-programs-page-title').textContent = CONFIG.ui.programsPageTitle;
            document.getElementById('ui-about-sheet-title').textContent = CONFIG.ui.aboutSheetTitle;
            document.getElementById('ui-training-sheet-title').textContent = CONFIG.ui.trainingSheetTitle;
            document.getElementById('training-btn').textContent = CONFIG.ui.enrollBtn;
            document.getElementById('service-sheet-btn').textContent = CONFIG.ui.enrollBtn;
            document.getElementById('ui-fortune-sheet-title').textContent = CONFIG.ui.fortuneSheetTitle;
            document.getElementById('ui-review-sheet-title').textContent = CONFIG.ui.reviewSheetTitle;
            document.getElementById('review-input-name').placeholder = CONFIG.ui.reviewNamePlaceholder;
            document.getElementById('review-input-text').placeholder = CONFIG.ui.reviewTextPlaceholder;
            document.getElementById('review-submit-btn').textContent = CONFIG.ui.reviewSubmitBtn;

            // Настройки разработчика (Твой копирайт)
            document.getElementById('developer-link-el').href = MY_DEVELOPER_LINK;
            document.getElementById('developer-name-el').textContent = MY_DEVELOPER_NAME;

            // Настройки ПК-стенда
            document.getElementById('desktop-title').innerHTML = DESKTOP_TITLE;
            document.getElementById('desktop-desc').innerHTML = DESKTOP_DESC;
            document.getElementById('desktop-qr').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(DESKTOP_QR_LINK)}&bgcolor=ffffff&color=000000&margin=1`;

            // Профиль
            document.getElementById('profile-avatar').src = CONFIG.profile.avatar;
            document.getElementById('profile-name').textContent = CONFIG.profile.name;
            document.getElementById('profile-bio').textContent = CONFIG.profile.bio;

            // Шторка "Давайте знакомиться" (Рендерим галерею)
            renderGallery('about-gallery-container', CONFIG.about.photos || [CONFIG.about.photo]);
            document.getElementById('about-text').innerHTML = CONFIG.about.text;

            // Генерация квадратных карточек-рубрик
            const container = document.getElementById('links-container');
            container.innerHTML = '';
            
            CONFIG.categories.forEach((item, index) => {
                let onClickAction = `openPostsSheet(${index})`;
                if (item.action === 'training') onClickAction = `openTrainingSheet()`;
                if (item.action === 'services') onClickAction = `openServicesPage()`;
                if (item.action === 'programs') onClickAction = `openProgramsPage()`;

                if (item.type === 'wide') {
                    const badgeHtml = item.badge 
                        ? `<div class="absolute -top-3 left-6 bg-white text-black text-[10px] font-extrabold px-3 py-1 w-max rounded-full shadow-[0_5px_15px_rgba(255,255,255,0.3)] z-10">${item.badge}</div>` 
                        : '';

                    container.innerHTML += `
                        <button onclick="${onClickAction}" class="col-span-2 block relative rounded-3xl p-5 card-shadow transition-transform active:scale-[0.98] flex items-center justify-between text-left w-full mt-1">
                            ${badgeHtml}
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-12 rounded-full border border-white/40 flex items-center justify-center bg-white/10 text-white text-2xl shadow-sm shrink-0">
                                    ${item.icon}
                                </div>
                                <div>
                                    <h3 class="text-[16px] font-bold text-white">${item.title}</h3>
                                    ${item.subtitle ? `<p class="text-[13px] font-medium text-gray-300 mt-0.5">${item.subtitle}</p>` : ''}
                                </div>
                            </div>
                            <i class="ph-bold ph-caret-right text-gray-400 text-xl"></i>
                        </button>
                    `;
                } else {
                    const badgeHtml = item.badge 
                        ? `<div class="absolute -top-3 left-1/2 -translate-x-1/2 bg-white text-black text-[10px] font-extrabold px-3 py-1 w-max rounded-full shadow-[0_5px_15px_rgba(255,255,255,0.3)] z-10">${item.badge}</div>` 
                        : '';

                    container.innerHTML += `
                        <button onclick="${onClickAction}" class="block relative rounded-3xl p-4 card-shadow transition-transform active:scale-[0.98] flex flex-col items-center justify-center aspect-square w-full text-center">
                            ${badgeHtml}
                            <div class="w-12 h-12 rounded-full border border-white/40 flex items-center justify-center mb-3 bg-white/10 text-2xl text-white">
                                ${item.icon}
                            </div>
                            <h3 class="text-[14px] font-bold text-white leading-tight">${item.title}</h3>
                        </button>
                    `;
                }
            });

            // Рендер списка услуг для отдельной страницы
            const servicesList = document.getElementById('services-list');
            servicesList.innerHTML = '';
            CONFIG.services.forEach((s, index) => {
                const thumb = s.photos && s.photos.length > 0 ? s.photos[0] : s.photo;
                servicesList.innerHTML += `
                    <div class="card-shadow rounded-[2rem] p-4 flex flex-col gap-4 active:scale-[0.98] transition-transform text-left cursor-pointer" onclick="openServiceDetails(${index})">
                        <!-- Большое фото на всю ширину карточки -->
                        <img src="${thumb}" class="w-full h-48 md:h-56 rounded-2xl object-cover shadow-lg border border-white/10">
                        
                        <!-- Блок с текстом и кнопками -->
                        <div class="flex flex-col flex-grow">
                            <h3 class="text-white font-bold text-[16px] mb-2 leading-tight">${s.title}</h3>
                            <p class="text-gray-300 text-[12px] line-clamp-3 leading-relaxed mb-4">${(s.shortDesc || '').replace(/\n/g, '<br>')}</p>
                            
                            <!-- Подвал карточки: цена и кнопка (прижаты к низу) -->
                            <div class="flex items-end justify-between mt-auto pt-4 border-t border-white/10">
                                <div class="flex flex-col">
                                    ${s.oldPrice ? `<span class="text-gray-400 text-[11px] line-through leading-none mb-1">${s.oldPrice}</span>` : ''}
                                    <span class="text-white font-black text-[18px] leading-none drop-shadow-md">${s.newPrice}</span>
                                </div>
                                <div class="text-[12px] font-bold text-white bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full shadow-lg flex items-center gap-1">
                                    ${CONFIG.ui.moreBtn} <i class="ph-bold ph-caret-right"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            // Рендер списка программ для отдельной страницы
            const programsList = document.getElementById('programs-list');
            programsList.innerHTML = '';
            if (CONFIG.programs) {
                CONFIG.programs.forEach((p, index) => {
                    const thumb = p.photos && p.photos.length > 0 ? p.photos[0] : p.photo;
                    programsList.innerHTML += `
                        <div class="card-shadow rounded-[2rem] p-4 flex flex-col gap-4 active:scale-[0.98] transition-transform text-left cursor-pointer" onclick="openProgramDetails(${index})">
                            <!-- Большое фото на всю ширину карточки -->
                            <img src="${thumb}" class="w-full h-48 md:h-56 rounded-2xl object-cover shadow-lg border border-white/10" onerror="this.style.display='none'">
                            
                            <!-- Блок с текстом и кнопками -->
                            <div class="flex flex-col flex-grow">
                                <h3 class="text-white font-bold text-[16px] mb-2 leading-tight">${p.title}</h3>
                                <p class="text-gray-300 text-[12px] line-clamp-3 leading-relaxed mb-4">${(p.shortDesc || '').replace(/\n/g, '<br>')}</p>
                                
                                <!-- Подвал карточки: цена и кнопка (прижаты к низу) -->
                                <div class="flex items-end justify-between mt-auto pt-4 border-t border-white/10">
                                    <div class="flex flex-col">
                                        ${p.oldPrice ? `<span class="text-gray-400 text-[11px] line-through leading-none mb-1">${p.oldPrice}</span>` : ''}
                                        <span class="text-white font-black text-[18px] leading-none drop-shadow-md">${p.newPrice}</span>
                                    </div>
                                    <div class="text-[12px] font-bold text-white bg-white/10 backdrop-blur-md border border-white/20 px-4 py-2 rounded-full shadow-lg flex items-center gap-1">
                                        ${CONFIG.ui.moreBtn} <i class="ph-bold ph-caret-right"></i>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }

            // Рендер карусели отзывов (Премиальные стеклянные плашки)
            const reviewsContainer = document.getElementById('reviews-container');
            reviewsContainer.innerHTML = '';
            CONFIG.reviews.forEach(review => {
                let starsHtml = '';
                for(let i=0; i<5; i++) {
                    if(i < review.stars) {
                        starsHtml += '<i class="ph-fill ph-star text-orange-400 drop-shadow-md"></i>';
                    } else {
                        starsHtml += '<i class="ph ph-star text-gray-500"></i>';
                    }
                }
                
                reviewsContainer.innerHTML += `
                    <div class="snap-start shrink-0 w-[85%] bg-black/40 backdrop-blur-2xl border border-white/10 rounded-[1.5rem] p-5 flex flex-col justify-between relative overflow-hidden ml-1 my-2">

                        <div class="relative z-10">

                                    <h4 class="text-white font-bold text-[15px]">${review.name}</h4>
                                </div>
                                <span class="text-gray-300 text-[11px] font-medium opacity-80">${review.date}</span>
                            </div>

                                ${starsHtml}
                            </div>
                            <p class="text-gray-100 text-[13px] leading-relaxed font-medium italic">"${review.text}"</p>
                        </div>
                    </div>
                `;
            });

            // Соцсети
            document.getElementById('social-vk').href = CONFIG.socials.vk;
            document.getElementById('social-theater').href = CONFIG.socials.theater;
            document.getElementById('social-camp').href = CONFIG.socials.camp;
        }

        // --- ЛОГИКА ПЕРЕКЛЮЧЕНИЯ ЯЗЫКА ---
        function toggleLanguage() {
            vkHaptic.impactOccurred('medium');
            const langBtn = document.getElementById('lang-btn');
            
            // Находим главные экраны для эффекта плавного затухания
            const screens = [document.getElementById('main-screen'), document.getElementById('services-screen'), document.getElementById('programs-screen')];
            
            // Плавно прячем контент
            screens.forEach(s => { 
                if(s) {
                    s.style.transition = 'opacity 0.2s ease'; 
                    s.style.opacity = '0'; 
                }
            });
            
            // Меняем язык через 200мс (пока контент скрыт)
            setTimeout(() => {
                currentLang = currentLang === 'ru' ? 'en' : 'ru';
                langBtn.textContent = currentLang === 'ru' ? 'EN' : 'RU';
                
                // Берем нужный конфиг (APP_DATA.ru или APP_DATA.en)
                CONFIG = APP_DATA[currentLang];
                
                // Перерисовываем интерфейс с новыми данными
                renderApp();
                
                // Плавно возвращаем контент
                screens.forEach(s => { 
                    if(s) s.style.opacity = '1'; 
                });

        // Блокировка и разблокировка скролла главного экрана
        function lockScroll() {
            globalScrollPos = window.scrollY || window.pageYOffset;
            
            // Фикс №2: 100% железобетонный блок для iOS/Android: фиксируем сам body
            document.body.style.position = 'fixed';
            document.body.style.top = `-${globalScrollPos}px`;
            document.body.style.width = '100%';
            
            document.body.style.overflow = 'hidden';
            document.documentElement.style.overflow = 'hidden';
            document.body.style.overscrollBehavior = 'none'; 
            
            const scrollContainer = document.getElementById('app-scroll-container');
            if (scrollContainer) {
                scrollContainer.style.overflow = 'hidden';
                scrollContainer.style.touchAction = 'none'; 
                scrollContainer.style.pointerEvents = 'none'; 
            }
        }
        
        function unlockScroll() {
            // Возвращаем body в исходное состояние
            document.body.style.position = '';
            document.body.style.top = '';
            document.body.style.width = '';
            
            document.body.style.overflow = '';
            document.documentElement.style.overflow = '';
            document.body.style.overscrollBehavior = ''; 
            
            // Восстанавливаем прокрутку, чтобы экран не прыгал наверх
            window.scrollTo(0, globalScrollPos);
            
            const scrollContainer = document.getElementById('app-scroll-container');
            if (scrollContainer) {
                scrollContainer.style.overflow = '';
                scrollContainer.style.touchAction = ''; 
                scrollContainer.style.pointerEvents = '';

        function submitReview() {

            const text = document.getElementById('review-input-text').value || "";

            // Если указана ссылка на скрипт, отправляем данные в "Новые отзывы"
            if (GOOGLE_SCRIPT_URL) {
                try {

                    // ФИНАЛЬНОЕ ИСПРАВЛЕНИЕ: Отправляем как классическую веб-форму (URLSearchParams).
                    const formData = new URLSearchParams();
                    formData.append('action', 'addReview');
                    formData.append('name', name);
                    formData.append('text', text);
                    formData.append('rating', safeRating);

                    fetch(GOOGLE_SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: formData
                    }).catch(err => console.log('Отправка в фоне', err));
                    
                } catch(e) { console.log('Ошибка отправки отзыва', e); }
            }

            showToast(CONFIG.ui.toastSuccess, 'ph-fill ph-heart');
            closeSheet();
        }

        // Рендер галереи-свайпера с точками
        function renderGallery(containerId, photos) {
            const wrapper = document.getElementById(containerId);
            if (!photos || photos.length === 0) return;
            
            // Задаем квадратные фото для всех галерей (включая услуги)
            const aspectClass = 'aspect-square';
            
            let html = `
            <div class="relative w-full ${aspectClass} rounded-[2rem] overflow-hidden mb-5 shadow-[0_10px_30px_rgba(0,0,0,0.5)] bg-black/20">
                <div class="flex overflow-x-auto snap-x snap-mandatory hide-scrollbar h-full w-full" id="${containerId}-scroll" onscroll="updateGalleryDots('${containerId}')">
                    ${photos.map(p => `<img src="${p}" class="w-full h-full object-cover shrink-0 snap-center">`).join('')}
                </div>
                ${photos.length > 1 ? `
                <div class="absolute bottom-4 left-0 w-full flex flex-wrap justify-center gap-2 z-10 px-4" id="${containerId}-dots">
                    ${photos.map((_, i) => `<div class="w-2 h-2 shrink-0 rounded-full bg-white transition-all duration-300 shadow-md ${i === 0 ? 'opacity-100 scale-125' : 'opacity-40'}"></div>`).join('')}
                </div>
                ` : ''}
            </div>
            `;
            wrapper.innerHTML = html;
        }

        // Обновление активной точки при свайпе галереи
        function updateGalleryDots(containerId) {
            const scrollContainer = document.getElementById(`${containerId}-scroll`);
            const dotsContainer = document.getElementById(`${containerId}-dots`);
            if (!scrollContainer || !dotsContainer) return;
            
            const scrollLeft = scrollContainer.scrollLeft;
            const width = scrollContainer.clientWidth;
            const index = Math.round(scrollLeft / width);
            
            Array.from(dotsContainer.children).forEach((dot, i) => {
                if (i === index) {
                    dot.classList.remove('opacity-40');
                    dot.classList.add('opacity-100', 'scale-125');
                } else {
                    dot.classList.remove('opacity-100', 'scale-125');
                    dot.classList.add('opacity-40');
                }
            });
        }

        // --- ЛОГИКА ЗАГРУЗКИ ИЗ GOOGLE ТАБЛИЦ ---
        async function fetchGoogleSheet(sheetName) {
            if (!GOOGLE_SHEET_ID) return null;

            // Умное извлечение ID через регулярное выражение (RegEx) - надежная защита от кривых ссылок
            let cleanId = GOOGLE_SHEET_ID;
            const match = cleanId.match(/\/d\/([a-zA-Z0-9-_]+)/);
            if (match) {
                cleanId = match[1];
            }

            // Используем Google Visualization API для прямого чтения без скриптов
            const url = `https://docs.google.com/spreadsheets/d/${cleanId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
            try {
                const res = await fetch(url);
                const text = await res.text();
                
                // Если гугл вернул ошибку (например, доступ закрыт), останавливаем парсинг
                if (!text.includes('google.visualization.Query.setResponse')) {
                    console.error("Нет доступа к таблице. Проверьте права 'Все, у кого есть ссылка - Читатель'");
                    return null;
                }

                // Google возвращает JSONP, вырезаем чистый JSON
                const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const data = JSON.parse(jsonStr);
                return data.table.rows;
            } catch (e) {
                console.error("Ошибка загрузки вкладки: " + sheetName, e);
                return null;
            }
        }

                            text: row.c[5] ? String(row.c[5].v) : (row.c[4] ? String(row.c[4].v) : "")
                        })).filter(r => r.text && !r.name.toLowerCase().includes('имя') && !r.name.toLowerCase().includes('name'));
                    }
                    
                    CONFIG = APP_DATA[currentLang]; // Применяем загруженные данные
                } catch (e) {
                    console.error("Критическая ошибка при загрузке данных:", e);
                }
            }
            renderApp(); // Рисуем интерфейс (с таблицей или базовыми данными)
        }

        window.onload = () => {
            // МГНОВЕННАЯ ЗАГРУЗКА: Сначала рендерим базовый интерфейс
            renderApp();
            
            // Сразу прячем лоадер, чтобы кнопки не "тормозили"
            setTimeout(() => {
                const loader = document.getElementById('app-loader');
                if(loader) {
                    loader.classList.add('opacity-0');
                    setTimeout(() => loader.remove(), 500);
                }
            }, 100);

            // Запускаем асинхронную загрузку из Google Таблиц в фоне
            loadDynamicData();
            
            // --- ЛОГИКА 3D-НАКЛОНА (TILT EFFECT) ДЛЯ ГЛАВНОГО ФОТО ---
            const tiltCard = document.getElementById('tilt-card');
            const tiltGlare = document.getElementById('tilt-glare');
            
            if(tiltCard) {
                function handleTiltMove(e) {
                    // Убираем CSS-задержку во время движения, чтобы фото мгновенно следовало за пальцем
                    tiltCard.style.transition = 'none';
                    if(tiltGlare) tiltGlare.style.transition = 'none';

                    const rect = tiltCard.getBoundingClientRect();
                    // Получаем координаты мыши или пальца
                    const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
                    const clientY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
                    
                    const x = clientX - rect.left;
                    const y = clientY - rect.top;
                    
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    // Вычисляем угол наклона (максимум 12 градусов)
                    const rotateX = ((y - centerY) / centerY) * -12; 
                    const rotateY = ((x - centerX) / centerX) * 12;
                    
                    // Применяем наклон
                    tiltCard.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                    
                    // Двигаем блик
                    if(tiltGlare) {
                        tiltGlare.style.opacity = '1';
                        const glareX = (x / rect.width) * 100;
                        const glareY = (y / rect.height) * 100;
                        tiltGlare.style.background = `radial-gradient(circle at ${glareX}% ${glareY}%, rgba(255,255,255,0.4) 0%, transparent 60%)`;
                    }
                }
                
                function handleTiltLeave() {
                    // Возвращаем в исходное положение (Включаем плавную анимацию возврата)
                    tiltCard.style.transition = 'transform 0.5s ease-out';
                    tiltCard.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                    if(tiltGlare) {
                        tiltGlare.style.transition = 'opacity 0.5s ease-out';
                        tiltGlare.style.opacity = '0';
                    }
                }
                
                // Слушатели для мыши (ПК) и пальцев (Сенсор)
                tiltCard.addEventListener('mousemove', handleTiltMove);
                tiltCard.addEventListener('mouseleave', handleTiltLeave);
                tiltCard.addEventListener('touchmove', handleTiltMove, {passive: true});
                tiltCard.addEventListener('touchend', handleTiltLeave);
            }

            // Логика свайпа вниз для закрытия шторок
            let touchStartY = 0;
            let touchCurrentY = 0;
            document.querySelectorAll('.drag-handle').forEach(handle => {
                handle.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, {passive: true});
                handle.addEventListener('touchmove', (e) => {
                    touchCurrentY = e.touches[0].clientY;
                    e.preventDefault(); // Фикс №3: Полностью блокируем сдвиг экрана при свайпе за полосочку
                }, {passive: false}); // Обязательно false для работы preventDefault
                handle.addEventListener('touchend', (e) => {
                    if (touchCurrentY > touchStartY + 40) { // Если потянули вниз больше чем на 40px
                        closeSheet();
                    }
                });
            });
        };
    </script>
</body>
</html>
